name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Load cached venv
        id: cached-poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-py311-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py311-

      - name: Install system dependencies for geospatial libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Doc status guardrail
        run: bash scripts/check_doc_status.sh

      - name: Mypy type check
        run: poetry run mypy core api pipeline

      - name: Pytest
        run: poetry run pytest --cov=terra_core --cov=terra_api --cov=terra_pipeline --cov-report=term-missing

  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web dependencies
        working-directory: web
        run: |
          rm -rf node_modules
          npm ci --include=optional
          ROLLUP_VERSION="$(node -p "require('rollup/package.json').version")"
          case "$(uname -m)" in
            x86_64)
              npm install --no-save --force "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
              ;;
            aarch64|arm64)
              npm install --no-save --force "@rollup/rollup-linux-arm64-gnu@${ROLLUP_VERSION}"
              ;;
          esac
          node -e "require('rollup')"

      - name: Web tests
        working-directory: web
        run: |
          set +e
          # Strip ANSI so annotations stay readable; keep full log for the step.
          npm test > vitest-out.raw.txt 2>&1
          status=$?
          sed 's/\x1b\[[0-9;]*m//g' vitest-out.raw.txt > vitest-out.txt
          cat vitest-out.txt
          if [ "$status" -ne 0 ]; then
            # Prefer the error/fail block; fall back to the whole log.
            {
              echo "Vitest failed with exit code ${status}"
              if grep -nE 'FAIL|Error|RangeError|Cannot find|Unhandled|❯' vitest-out.txt >/tmp/vitest-hits.txt; then
                echo "----- matching lines -----"
                cat /tmp/vitest-hits.txt
              fi
              echo "----- full log -----"
              cat vitest-out.txt
            } > vitest-summary.txt
            # One annotation with the full summary (GitHub truncates long messages).
            python3 - <<'PY'
from pathlib import Path
text = Path("vitest-summary.txt").read_text(encoding="utf-8", errors="replace")
# Keep under annotation size limits while preserving the failure.
snippet = text[-3500:]
print(f"::error title=Vitest failed::{snippet.replace(chr(10), '%0A')}")
PY
          fi
          exit "$status"

      - name: Web build
        working-directory: web
        run: npm run build
