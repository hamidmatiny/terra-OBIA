name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Load cached venv
        id: cached-poetry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-py311-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py311-

      - name: Install system dependencies for geospatial libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Doc status guardrail
        run: bash scripts/check_doc_status.sh

      - name: Mypy type check
        run: poetry run mypy core api pipeline

      - name: Pytest
        run: poetry run pytest --cov=terra_core --cov=terra_api --cov=terra_pipeline --cov-report=term-missing

  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web dependencies
        working-directory: web
        run: |
          npm ci --include=optional
          if [ "$(uname -m)" = "x86_64" ]; then
            ROLLUP_VERSION="$(node -p "require('rollup/package.json').version")"
            npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
          fi
          node -e "require('rollup')"
          node -e "require('vitest')"

      - name: Web tests
        working-directory: web
        run: npm test

      - name: Web build
        working-directory: web
        run: npm run build
